<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burroughs Family Cookbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

  <!-- COVER PAGE -->
  <div id="coverPage" onclick="openCookbook()" style="position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1208;cursor:pointer;">
    <style>
      @keyframes coverReveal {from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulse {0%,100%{opacity:0.5}50%{opacity:1}}
      #coverPage.closing{opacity:0!important;transform:scale(1.04)!important;pointer-events:none;transition:opacity 0.85s ease,transform 0.85s ease;}
      #coverPage{transition:opacity 0.85s ease,transform 0.85s ease;}
    </style>
    <div style="position:relative;width:min(400px,88vw);box-shadow:0 20px 80px rgba(0,0,0,0.85),0 0 0 3px #6b4c2a,0 0 0 7px #3b2a1a;border-radius:2px;overflow:hidden;animation:coverReveal 1.2s ease both;">
      <img src="web-images/CoverPage.png" alt="Burroughs Family Cookbook" style="width:100%;display:block;filter:sepia(10%) contrast(1.04);" />
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.4) 100%);pointer-events:none;"></div>
    </div>
    <div style="margin-top:2rem;text-align:center;animation:coverReveal 1.2s 0.25s ease both;">
      <div style="font-family:'Lora',Georgia,serif;font-style:italic;font-size:0.88rem;color:#a07850;letter-spacing:0.14em;animation:pulse 2.5s 1.6s ease-in-out infinite;">tap to open</div>
    </div>
  </div>
  <script>
    function openCookbook() {
      const c = document.getElementById('coverPage');
      c.classList.add('closing');
      setTimeout(() => c.style.display = 'none', 880);
    }
  </script>


<header class="site-header">
  <div class="header-inner">
    <div class="site-title">Burroughs<br>Family Cookbook</div>
    <div class="divider">✦ &nbsp; ✦ &nbsp; ✦</div>
    <div class="site-subtitle">Treasured recipes, passed through generations</div>

  <div class="divider">✦ &nbsp; ✦</div>
  
  <!-- dedication Recognitions and spiritual quotes -->
  
	<div class="header-dedication">
	
	  <a href="assets/BFC-Dedication.jpg" class="image-modal-link" onclick="openImageModal(event, 'assets/BFC-Dedication.jpg')">
		Dedication

	  <a href="assets/BFC-Spiritual-Quotes.jpg" class="image-modal-link" onclick="openImageModal(event, 'assets/BFC-Spiritual-Quotes.jpg')">

		</div>

  <!-- end dedication Recognitions and spiritual quotes -->

</header>

	  <a href="flipbook-view.html" class="flipbook-link">Open the Book</a>	

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search recipes or contributors…" oninput="filterRecipes()">
  </div>
  <div class="filter-btns" id="filterBtns">
  
	  <div class="btn-row version-row">
		<button class="filter-btn active" onclick="setVersionFilter('All', this)">All</button>
		<button class="filter-btn" onclick="setVersionFilter('Volume 1', this)">Volume 1</button>
		<button class="filter-btn" onclick="setVersionFilter('Volume 2', this)">Volume 2</button>
  	  </div>

	  <div class="btn-row category-row">
		<button class="filter-btn active" onclick="setCategoryFilter('All', this)">All</button>
		<button class="filter-btn" onclick="setCategoryFilter('Main Dish', this)">Main Dish</button>
		<button class="filter-btn" onclick="setCategoryFilter('Side Dish', this)">Side Dish</button>
		<button class="filter-btn" onclick="setCategoryFilter('Salad', this)">Salad</button>
		<button class="filter-btn" onclick="setCategoryFilter('Cookies', this)">Cookies</button>
		<button class="filter-btn" onclick="setCategoryFilter('Cakes & Frostings', this)">Cakes & Frostings</button>
		<button class="filter-btn" onclick="setCategoryFilter('Pies & Desserts', this)">Pies & Desserts</button>
		<button class="filter-btn" onclick="setCategoryFilter('Miscellaneous', this)">Miscellaneous</button>
	  </div>	
  </div>
</div>

<div class="recipe-count" id="recipeCount"></div>

<div class="recipe-grid" id="recipeGrid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-head">
      <div class="modal-category" id="mCategory"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-contributor" id="mContributor"></div>
      <div class="modal-meta" id="mMeta"></div>
    </div>
    <div class="modal-body">
      <div class="serving-row">
        <div class="serving-label">Adjust servings:</div>
        <div class="serving-controls">
          <button class="serving-btn" onclick="changeServings(-1)">−</button>
          <div class="serving-count" id="servingCount">4</div>
          <button class="serving-btn" onclick="changeServings(1)">+</button>
        </div>
      </div>
      <div class="section-title">Ingredients</div>
      <ul class="ingredients-list" id="mIngredients"></ul>
      <div class="section-title">Instructions</div>
      <ol class="steps-list" id="mSteps"></ol>
      <div id="mNotes"></div>
    </div>
  </div>
</div>

<footer>Burroughs Family Cookbook &nbsp;✦&nbsp; Digitized with love</footer>

<script src="js/recipes.js"></script>
<script src="js/image-open.js"></script>

<script>

let currentCategory = 'All';
let currentVersion = 'All';
let currentRecipe = null;
let currentServings = 4;
let baseServings = 4;

function getPreview(recipe) {
  return recipe.ingredients.slice(0, 3).map(i => i.item).join(', ') + (recipe.ingredients.length > 3 ? '…' : '');
}

function renderCards(list) {
  const grid = document.getElementById('recipeGrid');
  document.getElementById('recipeCount').textContent =
    list.length === RECIPES.length ? `${list.length} recipes` : `${list.length} of ${RECIPES.length} recipes`;
  if (list.length === 0) {
    if (currentVersion === 'Volume 2') {
      grid.innerHTML = '<div class="empty-state">Volume 2 is coming soon! ' +
        '<a href="volume-2-submit-recipe.html" class="image-modal-link">Learn more</a></div>';
    } else {
      grid.innerHTML = '<div class="empty-state">No recipes found. Try a different search.</div>';
    }
    return;
  }
  grid.innerHTML = list.map((r, i) => `
    <div class="recipe-card" style="animation-delay:${i * 0.06}s" onclick="openModal(${r.id})">
      <div class="card-header">
        <div class="card-category">${r.category}</div>
        <div class="card-title">${r.title}</div>
        <div class="card-contributor">— ${r.contributor}</div>
      </div>
      <div class="card-body">
        <div class="card-meta">
		  <span>🍽 Serves ${r.servings ?? 'a few'}</span>
          ${r.temps ? `<span>🌡 ${r.temps}</span>` : ''}
        </div>
        <div class="card-preview">${getPreview(r)}</div>
      </div>
    </div>
  `).join('');
}

function filterRecipes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = RECIPES.filter(r => {
    const matchCat = currentCategory === 'All' || r.category === currentCategory;
    const matchVersion = currentVersion === 'All' || r.version === currentVersion;
    const matchQ = !q || r.title.toLowerCase().includes(q) || r.contributor.toLowerCase().includes(q) ||
	  r.version.toLowerCase().includes(q) ||
      r.ingredients.some(i => i.item.toLowerCase().includes(q));
    return matchCat && matchVersion && matchQ;
  });
  renderCards(list);
}

function setCategoryFilter(cat, btn) {
  currentCategory = cat;
  btn.closest('.btn-row').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterRecipes();
}

function setVersionFilter(ver, btn) {
  currentVersion = ver;
  btn.closest('.btn-row').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterRecipes();
}


// this is the original method from claude
// some recipes did not provide a 'serves #' which caused 
// issues with scaling up or down via the 'serves' button
// keeping this for now
function scaleAmountOriginal(amountStr, base, current) {
  // Try to scale numeric amounts
  const match = amountStr.match(/^([\d.\/½¼¾⅓⅔]+)\s*(.*)/);
  if (!match) return amountStr;
  let num = match[1];
  const unit = match[2];
  // Convert fractions
  const fracs = {'½':0.5,'¼':0.25,'¾':0.75,'⅓':0.333,'⅔':0.667};
  let val = parseFloat(num) || fracs[num] || null;
  if (!val) return amountStr;
  let scaled = (val / base) * current;
  // Format nicely
  let display;
  if (scaled === Math.floor(scaled)) display = scaled.toString();
  else display = scaled.toFixed(1).replace(/\.0$/, '');
  return `${display} ${unit}`.trim();
}

function scaleAmount(amountStr, base, current) {
  // 1. Try to scale numeric amounts
  // Regex: look for a number/fraction at the start
  const match = amountStr.match(/^([\d.\/½¼¾⅓⅔\-]+)\s*(.*)/);
  if (!match) return amountStr;

  let numPart = match[1];
  const unit = match[2];

console.log(numPart); console.log(unit);

  // 2. Convert fractions/ranges
  const fracs = {'½':0.5,'¼':0.25,'¾':0.75,'⅓':0.333,'⅔':0.667};
  
  // Handle simple numbers or single fractions
  let val = parseFloat(numPart) || fracs[numPart] || null;

  // If it's a range (like "5-6"), just take the average or the first number
  if (!val && numPart.includes('–')) {
      val = parseFloat(numPart.split('–')[0]);
  }

console.log("val:", val, "| unit:", unit);

  // 3. IF NO VALID NUMBER IS FOUND, RETURN ORIGINAL STRING IMMEDIATELY
  if (val === null || isNaN(val)) return amountStr;

  // 4. Perform math
  let scaled = (val / base) * current;

console.log("scaled:", scaled, "| unit:", unit);

  // 5. Format nicely
  let display = Number.isInteger(scaled) ? scaled.toString() : scaled.toFixed(1).replace(/\.0$/, '');
  
console.log(display); console.log(unit);  
  
  return `${display} ${unit}`.trim();
}

function renderIngredients() {
  const ul = document.getElementById('mIngredients');
  ul.innerHTML = currentRecipe.ingredients.map(ing => {
    const scaledAmt = ing.amount.match(/^(to taste|as needed|pinch)$/i)
      ? ing.amount
      : scaleAmount(ing.amount, baseServings, currentServings);
	  
    return `<li><span class="ing-amount">${scaledAmt}</span> ${ing.item}</li>`;
  }).join('');
}

function getServings(currentRecipe) {
  // If servings is missing, 0, or not a number, return 1
  if (!currentRecipe.servings || isNaN(currentRecipe.servings)) {
    currentRecipe.servings = 1;
  }
  return currentRecipe.servings;
}

function openModal(id) {
  currentRecipe = RECIPES.find(r => r.id === id);
  
  // handle when servings value is not provided in the recipe
  
  baseServings = getServings(currentRecipe);
  currentServings = getServings(currentRecipe);

  document.getElementById('mCategory').textContent = currentRecipe.category;
  document.getElementById('mTitle').textContent = currentRecipe.title;
  document.getElementById('mContributor').textContent = '— ' + currentRecipe.contributor;
  document.getElementById('mMeta').innerHTML =
    `<span>🍽 Serves ${currentRecipe.servings}</span>` +
    (currentRecipe.temps ? `<span>🌡 ${currentRecipe.temps}</span>` : '');
  document.getElementById('servingCount').textContent = currentServings;

  renderIngredients();

  document.getElementById('mSteps').innerHTML = currentRecipe.steps.map((s, i) =>
    `<li class="step"><span class="step-num">${i+1}.</span><span class="step-text">${s}</span></li>`
  ).join('');

  const notesEl = document.getElementById('mNotes');
  if (currentRecipe.notes) {
    notesEl.innerHTML = `<div class="recipe-notes"><strong>Notes</strong>${currentRecipe.notes.replace(/\n/g,'<br>')}</div>`;
  } else { notesEl.innerHTML = ''; }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function changeServings(delta) {
  currentServings = Math.max(1, currentServings + delta);
  document.getElementById('servingCount').textContent = currentServings;
  renderIngredients();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
renderCards(RECIPES);
</script>

</body>
</html>
